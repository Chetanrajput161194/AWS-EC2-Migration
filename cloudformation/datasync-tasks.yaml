Outputs:
  DataSyncAccessRoleArnUsed:
    Description: IAM role ARN used for all DataSync S3 locations
    Value: !If
      - UseRoleArn
      - !Ref DataSyncAccessRoleArn
      - !Sub "arn:aws:iam::${AWS::AccountId}:role/${DataSyncAccessRoleName}"

  TaskArns:
    Description: DataSync task ARNs (comma-separated)
    Value: !Join
      - ","
      - - !Ref TaskCloudCb
        - !Ref TaskCloudS3
        - !Ref TaskCloudS3Dev
        - !Ref TaskCloudS3Test
        - !Ref TaskCloudS3Uat
        - !Ref TaskDs3
        - !Ref TaskPs3
        - !Ref TaskOnediosProd
        - !Ref TaskOnediosQa
        - !Ref TaskOnediosUat

  StartExecutionCommand:
    Description: Example CLI to start all migrations
    Value: !Sub |
      for TASK in ${TaskCloudCb} ${TaskCloudS3} ${TaskCloudS3Dev} ${TaskCloudS3Test} ${TaskCloudS3Uat} ${TaskDs3} ${TaskPs3} ${TaskOnediosProd} ${TaskOnediosQa} ${TaskOnediosUat}; do
        aws datasync start-task-execution --task-arn "$TASK" --region ${AwsRegion}
      done
