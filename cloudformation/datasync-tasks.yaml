AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS DataSync locations and tasks for S3 bucket migration. Pass an existing
  IAM role (created manually or outside this repo). No cross-stack exports required.

Parameters:
  DataSyncAccessRoleArn:
    Type: String
    Default: ""
    Description: >
      Full ARN of an existing IAM role trusted by datasync.amazonaws.com.
      Provide this OR DataSyncAccessRoleName (not both required if name is set).
    AllowedPattern: "^$|^arn:aws:iam::[0-9]{12}:role/.+$"

  DataSyncAccessRoleName:
    Type: String
    Default: ""
    Description: >
      IAM role name in this account (e.g. opc-s3-datasync-iam-datasync-s3).
      Used when DataSyncAccessRoleArn is left empty.

  AwsRegion:
    Type: String
    Default: ap-south-1
    Description: Region for CLI hints in outputs.

  CreateDestinationBuckets:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Create empty destination buckets if they do not exist yet.

  StartTaskExecutionOnCreate:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Start an initial task execution when each DataSync task is created.

Conditions:
  CreateBuckets: !Equals [!Ref CreateDestinationBuckets, "true"]
  StartOnCreate: !Equals [!Ref StartTaskExecutionOnCreate, "true"]
  UseRoleArn: !Not [!Equals [!Ref DataSyncAccessRoleArn, ""]]

Mappings:
  BucketPairs:
    CloudCb:
      Source: opc-cloud-cb
      Destination: opc-rm-cloud-cb
    CloudS3:
      Source: opc-cloud-s3
      Destination: opc-rm-cloud-s3
    CloudS3Dev:
      Source: opc-cloud-s3-dev
      Destination: opc-rm-cloud-s3-dev
    CloudS3Test:
      Source: opc-cloud-s3-test
      Destination: opc-rm-cloud-s3-test
    CloudS3Uat:
      Source: opc-cloud-s3-uat
      Destination: opc-rm-cloud-s3-uat
    Ds3:
      Source: opc-ds3
      Destination: opc-rm-ds3
    Ps3:
      Source: opc-ps3
      Destination: opc-rm-ps3
    OnediosProd:
      Source: onedios-prod
      Destination: od-crm-prod
    OnediosQa:
      Source: onedios-qa
      Destination: od-crm-qa
    OnediosUat:
      Source: onedios-uat
      Destination: od-uat

Resources:
  DestBucketCloudCb:
    Type: AWS::S3::Bucket
    Condition: CreateBuckets
    Properties:
      BucketName: !FindInMap [BucketPairs, CloudCb, Destination]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DestBucketCloudS3:
    Type: AWS::S3::Bucket
    Condition: CreateBuckets
