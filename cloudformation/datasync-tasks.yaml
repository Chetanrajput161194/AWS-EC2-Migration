      SourceLocationArn: !GetAtt SourceLocationCloudCb.LocationArn
      DestinationLocationArn: !GetAtt DestLocationCloudCb.LocationArn
      Options:
        TransferMode: CHANGED
        VerifyMode: ONLY_FILES_TRANSFERRED
        OverwriteMode: ALWAYS
        Atime: BEST_EFFORT
        Mtime: PRESERVE
        PreserveDeletedFiles: PRESERVE
        PreserveDevices: NONE
        PosixPermissions: NONE
        TaskQueueing: ENABLED
      Tags:
        - Key: SourceBucket
          Value: !FindInMap [BucketPairs, CloudCb, Source]
        - Key: DestinationBucket
          Value: !FindInMap [BucketPairs, CloudCb, Destination]

